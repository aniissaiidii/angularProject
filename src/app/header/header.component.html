<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  
  <!-- Brand -->
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" routerLink="/">
      🏠 MonApp
    </a>

    <!-- Bouton hamburger (mobile) -->
    <button 
      class="navbar-toggler" 
      type="button" 
      data-bs-toggle="collapse" 
      data-bs-target="#navbarMain"
      aria-controls="navbarMain" 
      aria-expanded="false" 
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Liens -->
    <div class="collapse navbar-collapse" id="navbarMain">
      
      <!-- Liens gauche -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" 
             [routerLinkActiveOptions]="{exact: true}">
            🏠 Home
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/product" routerLinkActive="active">
            📦 Product
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/suggestion" routerLinkActive="active">
            💡 Suggestion
          </a>
        </li>

        <!-- Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" 
             id="navbarDropdown" 
             role="button" 
             data-bs-toggle="dropdown" 
             aria-expanded="false">
            ⚙️ Options
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="navbarDropdown">
            <li>
              <a class="dropdown-item" routerLink="/action">
                ⚡ Action
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="/another">
                🔧 Another action
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item" routerLink="/other">
                📋 Something else
              </a>
            </li>
          </ul>
        </li>

      </ul>

      <!-- Liens droite -->
      <ul class="navbar-nav mb-2 mb-lg-0 me-3">
        <li class="nav-item">
          <a class="nav-link" routerLink="/UserForm" routerLinkActive="active">
            👤 User
          </a>
        </li>
      </ul>

      <!-- Barre de recherche -->
      <form class="d-flex gap-2" (ngSubmit)="onSearch()">
        <input 
          class="form-control" 
          type="search" 
          placeholder="🔍 Rechercher..."
          aria-label="Search"
          [(ngModel)]="searchText"
          name="search"
        />
        <button 
          class="btn btn-outline-light" 
          type="submit"
          [disabled]="!searchText">
          Search
        </button>
      </form>

    </div>
  </div>
</nav>
