<div class="container">
  <h2>Liste des Suggestions</h2>

  <!-- Barre de recherche — Two-way binding [(ngModel)] -->
  <div class="search-bar">
    <input
      type="text"
      [(ngModel)]="searchText"
      placeholder="Rechercher par titre ou catégorie..."
    />
  </div>

  <!-- Liste des suggestions — *ngFor -->
  <div class="suggestions-list">

    <div class="card" *ngFor="let suggestion of filteredSuggestions">

      <!-- Interpolation {{ }} -->
      <h3>{{ suggestion.title }}</h3>
      <p><strong>Catégorie :</strong> {{ suggestion.category }}</p>
      <p>{{ suggestion.description }}</p>
      <p><strong>Date :</strong> {{ suggestion.date | date:'dd/MM/yyyy' }}</p>
      <p><strong>Status :</strong>
        <span [class]="suggestion.status">{{ suggestion.status }}</span>
      </p>
      <p><strong>Likes :</strong> {{ suggestion.nbLikes }}</p>

      <!-- Boutons cachés si status = 'refusee' — *ngIf -->
      <div *ngIf="suggestion.status !== 'refusee'">

        <!-- Event binding (click) -->
        <button (click)="onLike(suggestion)">
          👍 Like ({{ suggestion.nbLikes }})
        </button>

        <button (click)="onAjouterFavori(suggestion)">
          ⭐ Ajouter aux favoris
        </button>
        

      </div>

    </div>

  </div>

  <!-- Liste des favoris -->
  <div *ngIf="favoris.length > 0">
    <h2>⭐ Mes Favoris</h2>
    <ul>
      <li *ngFor="let fav of favoris">
        <!-- Interpolation -->
        {{ fav.title }} — {{ fav.category }}
      </li>
    </ul>
  </div>
  

</div>
